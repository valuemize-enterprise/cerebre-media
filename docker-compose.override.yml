version: '3.9'

# ── Dev overrides — hot-reload via nodemon and Next.js HMR ────
# This file is automatically loaded alongside docker-compose.yml in dev.
# Usage: docker compose up  (override is applied automatically)

services:

  backend:
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
    command: npm run dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"

  worker:
    volumes:
      - ./backend/src:/app/src:ro
    command: node --watch src/workers/processor.js
    environment:
      NODE_ENV: development

  frontend:
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/next.config.js:/app/next.config.js:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
    command: npm run dev
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"   # Next.js dev server
      - "3001:3001"   # HMR websocket (if needed)
